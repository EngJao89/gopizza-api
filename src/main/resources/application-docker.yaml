spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-gopizza}
    username: ${POSTGRES_USER:-gopizza}
    password: ${POSTGRES_PASSWORD:-gopizza123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

