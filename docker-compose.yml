version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gopizza-postgres
    environment:
      POSTGRES_DB: gopizza
      POSTGRES_USER: gopizza
      POSTGRES_PASSWORD: gopizza123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gopizza"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gopizza-network

volumes:
  postgres_data:

networks:
  gopizza-network:
    driver: bridge

